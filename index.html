<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lyric Piano: Rewrite the Stars (Sustain Edition)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; transition: background 0.2s; }
        #menu-screen { text-align: center; max-width: 400px; }
        #game-board { display: none; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid #333; width: 600px; text-align: center; }
        
        .lyrics-container { height: 150px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 20px; }
        #active-word { font-size: 3rem; font-weight: 800; color: #00f2fe; text-transform: uppercase; transition: all 0.1s ease-out; }
        #next-line { font-size: 1rem; color: #666; margin-top: 10px; }
        
        .hit-key { font-size: 6rem; font-weight: 900; color: #f2fe00; margin: 20px 0; }
        .status-bar { font-size: 0.8rem; letter-spacing: 2px; color: #888; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Sustain Glow Effect */
        .holding { color: #fff !important; text-shadow: 0 0 30px #00f2fe; transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 class="mb-2">LYRIC PIANO</h1>
        <p class="text-muted mb-4">REWRITE THE STARS</p>
        <div class="d-grid gap-3">
            <button class="btn btn-outline-success btn-lg" onclick="startGame('relax')">🍃 RELAX MODE</button>
            <button class="btn btn-outline-danger btn-lg" onclick="startGame('challenge')">🔥 CHALLENGE MODE</button>
        </div>
        <p class="mt-4 small text-secondary">HOLD keys for longer notes, TAP for short ones.</p>
    </div>

    <div id="game-board">
        <div class="status-bar" id="game-status">READY...</div>
        <div class="lyrics-container">
            <div id="active-word">---</div>
            <div id="next-line">---</div>
        </div>
        <div id="target-letter" class="hit-key">-</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="script.js"></script>
</body>
</html>
